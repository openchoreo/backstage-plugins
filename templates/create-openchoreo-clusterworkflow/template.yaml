apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-openchoreo-clusterworkflow
  title: ClusterWorkflow
  description: Define a cluster-wide workflow template for building and automating tasks across all namespaces in OpenChoreo.
spec:
  owner: openchoreo-users
  type: ClusterWorkflow
  # Enable user token injection for user-based authorization at OpenChoreo API
  EXPERIMENTAL_formDecorators:
    - id: openchoreo:inject-user-token
  parameters:
    - title: ClusterWorkflow Metadata
      required:
        - clusterworkflow_name
      properties:
        clusterworkflow_name:
          title: ClusterWorkflow Name
          type: string
          description: Unique name for your cluster workflow (must be a valid Kubernetes name)
          ui:field: ResourceNamePicker
          ui:options:
            catalogKind: ClusterWorkflow
            resourceLabel: ClusterWorkflow
        is_component_workflow:
          title: Component Workflow
          type: boolean
          default: false
          description: Mark this workflow as a component workflow to scope it for component-level automation
          ui:field: SwitchField
        description:
          title: Description
          type: string
          description: Describe what this ClusterWorkflow is for
    - title: ClusterWorkflow Definition
      required:
        - yaml_definition
      properties:
        yaml_definition:
          title: ClusterWorkflow YAML
          type: string
          description: Edit the ClusterWorkflow YAML definition
          ui:field: ClusterWorkflowYamlEditor
  steps:
    - id: create-openchoreo-clusterworkflow
      name: Create OpenChoreo ClusterWorkflow
      action: openchoreo:clusterworkflow-definition:create
      input:
        yamlContent: ${{ parameters.yaml_definition }}
  output:
    links:
      - title: View ClusterWorkflow
        icon: catalog
        entityRef: ${{ steps['create-openchoreo-clusterworkflow'].output.entityRef }}
