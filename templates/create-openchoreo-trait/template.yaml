apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-openchoreo-trait
  title: Trait
  description: Define a reusable trait template to add cross-cutting capabilities like storage or observability to components.
spec:
  owner: openchoreo-users
  type: Trait
  # Enable user token injection for user-based authorization at OpenChoreo API
  EXPERIMENTAL_formDecorators:
    - id: openchoreo:inject-user-token
  parameters:
    - title: Trait Metadata
      required:
        - namespace_name
        - trait_name
      properties:
        namespace_name:
          title: Namespace Name
          type: string
          description: Namespace where the trait will be created
          ui:field: NamespaceEntityPicker
        trait_name:
          title: Trait Name
          type: string
          description: Unique name for your trait (must be a valid Kubernetes name)
          ui:field: ResourceNamePicker
          ui:options:
            catalogKind: TraitType
            resourceLabel: Trait
            namespaceField: namespace_name
        displayName:
          title: Display Name
          type: string
          description: A human-readable display name for the trait
        description:
          title: Description
          type: string
          description: Describe what this Trait is for
    - title: Trait Definition
      required:
        - yaml_definition
      properties:
        yaml_definition:
          title: Trait YAML
          type: string
          description: Edit the Trait YAML definition
          ui:field: TraitYamlEditor
          ui:backstage:
            review:
              mask: '(YAML definition provided)'
  steps:
    - id: create-openchoreo-trait
      name: Create OpenChoreo Trait
      action: openchoreo:trait-definition:create
      input:
        namespaceName: ${{ parameters.namespace_name }}
        yamlContent: ${{ parameters.yaml_definition }}
  output:
    links:
      - title: View Trait
        icon: catalog
        entityRef: ${{ steps['create-openchoreo-trait'].output.entityRef }}
