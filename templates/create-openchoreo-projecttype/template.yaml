apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-openchoreo-projecttype
  title: ProjectType
  description: Define a namespace-scoped template for the shared infrastructure (cell namespace, network policies, quotas) provisioned for every project of this type.
spec:
  owner: openchoreo-users
  type: ProjectType
  # Enable user token injection for user-based authorization at OpenChoreo API
  EXPERIMENTAL_formDecorators:
    - id: openchoreo:inject-user-token
  parameters:
    - title: ProjectType Metadata
      required:
        - namespace_name
        - projecttype_name
      properties:
        namespace_name:
          title: Namespace Name
          type: string
          description: Namespace where the project type will be created
          ui:field: NamespaceEntityPicker
        projecttype_name:
          title: ProjectType Name
          type: string
          description: Unique name for your project type (must be a valid Kubernetes name)
          ui:field: ResourceNamePicker
          ui:options:
            catalogKind: ProjectType
            resourceLabel: ProjectType
            namespaceField: namespace_name
        displayName:
          title: Display Name
          type: string
          description: A human-readable display name for the project type
        description:
          title: Description
          type: string
          description: Describe what this ProjectType is for
    - title: ProjectType Definition
      required:
        - yaml_definition
      properties:
        yaml_definition:
          title: ProjectType YAML
          type: string
          description: Edit the ProjectType YAML definition
          ui:field: ProjectTypeYamlEditor
          ui:backstage:
            review:
              mask: '(YAML definition provided)'
  steps:
    - id: create-openchoreo-projecttype
      name: Create OpenChoreo ProjectType
      action: openchoreo:projecttype-definition:create
      input:
        namespaceName: ${{ parameters.namespace_name }}
        yamlContent: ${{ parameters.yaml_definition }}
  output:
    links:
      - title: View ProjectType
        icon: catalog
        entityRef: ${{ steps['create-openchoreo-projecttype'].output.entityRef }}
