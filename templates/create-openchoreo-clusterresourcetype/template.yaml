apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-openchoreo-clusterresourcetype
  title: ClusterResourceType
  description: Define a cluster-wide template for managed-infrastructure dependencies (databases, queues, caches, object storage) that components can consume.
spec:
  owner: openchoreo-users
  type: ClusterResourceType
  # Enable user token injection for user-based authorization at OpenChoreo API
  EXPERIMENTAL_formDecorators:
    - id: openchoreo:inject-user-token
  parameters:
    - title: ClusterResourceType Metadata
      required:
        - clusterresourcetype_name
      properties:
        clusterresourcetype_name:
          title: ClusterResourceType Name
          type: string
          description: Unique name for your cluster resource type (must be a valid Kubernetes name)
          ui:field: ResourceNamePicker
          ui:options:
            catalogKind: ClusterResourceType
            resourceLabel: ClusterResourceType
        displayName:
          title: Display Name
          type: string
          description: A human-readable display name for the cluster resource type
        description:
          title: Description
          type: string
          description: Describe what this ClusterResourceType is for
    - title: ClusterResourceType Definition
      required:
        - yaml_definition
      properties:
        yaml_definition:
          title: ClusterResourceType YAML
          type: string
          description: Edit the ClusterResourceType YAML definition
          ui:field: ClusterResourceTypeYamlEditor
          ui:backstage:
            review:
              mask: '(YAML definition provided)'
  steps:
    - id: create-openchoreo-clusterresourcetype
      name: Create OpenChoreo ClusterResourceType
      action: openchoreo:clusterresourcetype-definition:create
      input:
        yamlContent: ${{ parameters.yaml_definition }}
  output:
    links:
      - title: View ClusterResourceType
        icon: catalog
        entityRef: ${{ steps['create-openchoreo-clusterresourcetype'].output.entityRef }}
