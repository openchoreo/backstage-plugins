apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-openchoreo-clusterprojecttype
  title: ClusterProjectType
  description: Define a cluster-wide template for the shared infrastructure (cell namespace, network policies, quotas) provisioned for every project of this type.
spec:
  owner: openchoreo-users
  type: ClusterProjectType
  # Enable user token injection for user-based authorization at OpenChoreo API
  EXPERIMENTAL_formDecorators:
    - id: openchoreo:inject-user-token
  parameters:
    - title: ClusterProjectType Metadata
      required:
        - clusterprojecttype_name
      properties:
        clusterprojecttype_name:
          title: ClusterProjectType Name
          type: string
          description: Unique name for your cluster project type (must be a valid Kubernetes name)
          ui:field: ResourceNamePicker
          ui:options:
            catalogKind: ClusterProjectType
            resourceLabel: ClusterProjectType
        displayName:
          title: Display Name
          type: string
          description: A human-readable display name for the cluster project type
        description:
          title: Description
          type: string
          description: Describe what this ClusterProjectType is for
    - title: ClusterProjectType Definition
      required:
        - yaml_definition
      properties:
        yaml_definition:
          title: ClusterProjectType YAML
          type: string
          description: Edit the ClusterProjectType YAML definition
          ui:field: ClusterProjectTypeYamlEditor
          ui:backstage:
            review:
              mask: '(YAML definition provided)'
  steps:
    - id: create-openchoreo-clusterprojecttype
      name: Create OpenChoreo ClusterProjectType
      action: openchoreo:clusterprojecttype-definition:create
      input:
        yamlContent: ${{ parameters.yaml_definition }}
  output:
    links:
      - title: View ClusterProjectType
        icon: catalog
        entityRef: ${{ steps['create-openchoreo-clusterprojecttype'].output.entityRef }}
