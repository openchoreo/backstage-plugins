name: Build and Test
on:
  push:
    branches:
      - main
      - 'release-v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openchoreo/openchoreo-ui

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint:all

      - name: Check formatting
        run: yarn prettier --check .

  audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Security audit
        run: yarn npm audit --environment production --severity high

  test:
    name: Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # Required for Codecov OIDC
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: yarn test:all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: ${{ github.event_name == 'push' }}
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}

      - name: Coverage summary
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f coverage/lcov.info ] && [ -s coverage/lcov.info ]; then
            LINES_FOUND=$(awk '/^DA:/{n++} END{print n+0}' coverage/lcov.info)
            LINES_HIT=$(awk -F, '/^DA:/{if($2+0>0)n++} END{print n+0}' coverage/lcov.info)
            if [ "$LINES_FOUND" -gt 0 ]; then
              COVERAGE=$(( LINES_HIT * 100 / LINES_FOUND ))
              echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Lines found | $LINES_FOUND |" >> $GITHUB_STEP_SUMMARY
              echo "| Lines hit | $LINES_HIT |" >> $GITHUB_STEP_SUMMARY
              echo "| **Line coverage** | **${COVERAGE}%** |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ No coverage data found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check generated types freshness
        run: |
          yarn workspace @openchoreo/openchoreo-client-node generate:clients
          if ! git diff --quiet --exit-code packages/openchoreo-client-node/src/generated/ packages/openchoreo-client-node/src/version.ts; then
            echo "::error::Generated types are stale. Run 'yarn workspace @openchoreo/openchoreo-client-node generate:clients' and commit the changes."
            git diff --stat packages/openchoreo-client-node/src/generated/ packages/openchoreo-client-node/src/version.ts
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: TypeScript compile
        run: yarn tsc

      - name: Build
        run: yarn build:all

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    needs: [lint, audit, test, build]
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub container registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Set image tag
        id: tag
        run: |
          echo "GIT_SHA_SHORT=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push commit image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          push: true
          file: ./packages/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.GIT_SHA_SHORT }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
