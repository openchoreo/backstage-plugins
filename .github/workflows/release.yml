name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openchoreo/openchoreo-ui

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set commit SHA and release tag
        run: |
          echo "GIT_SHA_SHORT=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          RELEASE_TAG=${GITHUB_REF##*/}
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          # Detect prerelease versions (SemVer tags containing a hyphen, e.g., v1.0.0-rc.1)
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Set latest flag
        run: |
          git fetch --tags --force
          latest_tag=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          if [ "$latest_tag" == "${RELEASE_TAG}" ]; then
            echo "LATEST=true" >> $GITHUB_ENV
          else
            echo "LATEST=false" >> $GITHUB_ENV
          fi

      - name: Login to GitHub container registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag existing image with release version
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          if ! docker buildx imagetools inspect "${IMAGE}:${{ env.GIT_SHA_SHORT }}" > /dev/null 2>&1; then
            echo "::error::Image ${IMAGE}:${{ env.GIT_SHA_SHORT }} not found. Ensure the commit was pushed to a release branch before tagging."
            exit 1
          fi
          echo "Retagging ${IMAGE}:${{ env.GIT_SHA_SHORT }} -> ${IMAGE}:${{ env.RELEASE_TAG }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ env.RELEASE_TAG }}" \
            "${IMAGE}:${{ env.GIT_SHA_SHORT }}"

      - name: Tag latest if highest stable version
        if: env.LATEST == 'true' && env.IS_PRERELEASE == 'false'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Retagging ${IMAGE}:${{ env.RELEASE_TAG }} -> ${IMAGE}:latest"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${{ env.RELEASE_TAG }}"

      # TODO: Add npm package publishing via changesets once registry permissions are resolved.
