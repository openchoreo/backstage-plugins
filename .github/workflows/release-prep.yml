name: Release Prep

on:
  workflow_dispatch:
    inputs:
      major:
        description: 'Semver major component'
        required: true
        type: string
      minor:
        description: 'Semver minor component'
        required: true
        type: string
      patch:
        description: 'Semver patch component'
        required: true
        type: string
      pre_release_id:
        description: 'Prerelease identifier (e.g. rc.1, beta.2)'
        required: false
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.major }}-${{ github.event.inputs.minor }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  MAJOR: ${{ github.event.inputs.major }}
  MINOR: ${{ github.event.inputs.minor }}
  PATCH: ${{ github.event.inputs.patch }}
  PRE_RELEASE_ID: ${{ github.event.inputs.pre_release_id }}

jobs:
  prep:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "openchoreo-bot"
          git config user.email "openchoreo-bot@users.noreply.github.com"

      - name: Validate inputs
        run: |
          for var in MAJOR MINOR PATCH; do
            val="${!var}"
            if ! [[ "$val" =~ ^[0-9]+$ ]]; then
              echo "ERROR: $var must be a non-negative integer, got '$val'"
              exit 1
            fi
          done
          if [ -n "${PRE_RELEASE_ID}" ]; then
            if ! [[ "${PRE_RELEASE_ID}" =~ ^[a-zA-Z0-9.]+$ ]]; then
              echo "ERROR: pre_release_id must match [a-zA-Z0-9.]+"
              exit 1
            fi
          fi
          VER="v${MAJOR}.${MINOR}.${PATCH}"
          if [ -n "${PRE_RELEASE_ID}" ]; then
            VER="${VER}-${PRE_RELEASE_ID}"
          fi
          if git ls-remote origin "refs/tags/${VER}" | head -1 | grep -q .; then
            echo "ERROR: Tag ${VER} already exists"
            exit 1
          fi

      - name: Resolve base branch
        id: base
        run: |
          VER="${MAJOR}.${MINOR}"
          if git ls-remote origin "refs/heads/release-v${VER}" | head -1 | grep -q .; then
            echo "branch=release-v${VER}" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
          fi

      - name: Create prep branch and update VERSION
        run: |
          BASE="${{ steps.base.outputs.branch }}"
          VER="${MAJOR}.${MINOR}.${PATCH}"
          if [ -n "${PRE_RELEASE_ID}" ]; then
            VER="${VER}-${PRE_RELEASE_ID}"
          fi
          BRANCH="release-prep-v${VER}"
          git checkout -b "${BRANCH}" "origin/${BASE}"
          echo "${VER}" > VERSION
          git add VERSION
          git commit -s -m "chore: bump version to ${VER}"
          git push origin "${BRANCH}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          BASE="${{ steps.base.outputs.branch }}"
          VER="${MAJOR}.${MINOR}.${PATCH}"
          if [ -n "${PRE_RELEASE_ID}" ]; then
            VER="${VER}-${PRE_RELEASE_ID}"
          fi
          BRANCH="release-prep-v${VER}"
          gh pr create \
            --head "${BRANCH}" \
            --base "${BASE}" \
            --title "chore: bump version to ${VER}" \
            --body "Automated version bump to \`${VER}\`." \
            --label "type/release"
