openapi: 3.0.3
info:
  title: OpenChoreo Observer API
  description: |
    The OpenChoreo Observer API provides endpoints for querying logs,
    traces, and metrics from namespaces for components, projects, and environments,
    as well as logs from workflows.
    It integrates with separate observability modules to fetch the actual data via
    API calls to the adaptors provided by the modules.
  version: 1.0.0
  contact:
    name: OpenChoreo Team
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Logs
    description: Log retrieval endpoints
  - name: Health
    description: Health check endpoints

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check the health status of the observer service.
      operationId: health
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy
                  error:
                    type: string
                    example: 'opensearch: connection failed'

  # Logs query endpoint
  /api/v1/logs/query:
    post:
      tags:
        - Logs
      summary: Query logs
      description: Query logs from the observer service
      operationId: queryLogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogsQueryRequest'
      responses:
        '200':
          description: Logs queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                title: 'badRequest'
                errorCode: ''
                message: "Missing required fields 'startTime' and 'endTime'"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                title: 'unauthorized'
                errorCode: ''
                message: 'Invalid or missing token'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                title: 'forbidden'
                errorCode: ''
                message: 'Subject <xyz> has no permission to view logs of Namespace foo, Project bar, Component baz in Environment development'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                title: 'internalServerError'
                errorCode: 'OBS-V1-L-29'
                message: ''

  # TODO: Remove this in favor of /api/v1/logs/query
  /api/v1/namespaces/{namespaceName}/projects/{projectName}/components/{componentName}/workflow-runs/{runName}/logs:
    get:
      tags:
        - Logs
      summary: Get workflow run logs (stream)
      description: |
        Returns logs from a workflow run stored in the observability plane.
        This endpoint is used when logs are older than the TTL and have been archived to OpenSearch.
        Logs are returned as a JSON array of log entries with timestamps, optionally filtered by step.
      operationId: getComponentWorkflowRunLogs
      parameters:
        - name: namespaceName
          in: path
          required: true
          description: The namespace name
          schema:
            type: string
            example: 'reading-list-service-workflow-290506e5'
        - name: projectName
          in: path
          required: true
          description: The project name
          schema:
            type: string
            example: 'default'
        - name: componentName
          in: path
          required: true
          description: The component name
          schema:
            type: string
            example: 'reading-list-service'
        - name: runName
          in: path
          required: true
          description: The workflow run name
          schema:
            type: string
            example: 'reading-list-service-workflow-290506e5'
        - name: step
          in: query
          required: false
          description: Filter logs by a specific workflow step name
          schema:
            type: string
            example: build-step
      responses:
        '200':
          description: Successfully retrieved workflow run logs
          content:
            application/json:
              schema:
                type: array
                description: Array of log entries with timestamps
                items:
                  $ref: '#/components/schemas/ComponentWorkflowRunLogEntry'
              example:
                - timestamp: '2025-01-06T10:00:00.123Z'
                  log: 'Building application...'
                - timestamp: '2025-01-06T10:00:05.456Z'
                  log: 'Build completed successfully'
                - timestamp: '2025-01-06T10:00:10.789Z'
                  log: 'Pushing image to registry...'
                - timestamp: '2025-01-06T10:00:15.012Z'
                  log: 'Image pushed successfully'
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Workflow run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # TODO: Remove this as events support is not available in the observability plane yet
  /api/v1/namespaces/{namespaceName}/projects/{projectName}/components/{componentName}/workflow-runs/{runName}/events:
    get:
      tags:
        - Logs
      summary: Get workflow run events
      description: Retrieve events for a specific workflow run
      operationId: getWorkflowRunEvents
      parameters:
        - name: namespaceName
          in: path
          required: true
          description: The namespace name
          schema:
            type: string
            example: 'reading-list-service-workflow-290506e5'
        - name: projectName
          in: path
          required: true
          description: The project name
          schema:
            type: string
            example: 'default'
        - name: componentName
          in: path
          required: true
          description: The component name
          schema:
            type: string
            example: 'reading-list-service'
        - name: runName
          in: path
          required: true
          description: The workflow run name
          schema:
            type: string
            example: 'reading-list-service-workflow-290506e5'
        - name: step
          in: query
          required: false
          description: Filter events by a specific workflow step name
          schema:
            type: string
            example: build-step
      responses:
        '200':
          description: Successfully retrieved workflow run events
          content:
            application/json:
              schema:
                type: array
                description: Array of event entries with timestamps
                items:
                  $ref: '#/components/schemas/ComponentWorkflowRunEventEntry'
              example:
                - timestamp: '2025-01-06T10:00:00.123Z'
                  type: 'build-started'
                  reason: 'Build started'
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Workflow run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Metrics query endpoint
  /api/v1/metrics/query:
    post:
      tags:
        - Metrics
      summary: Query metrics
      description: Query metrics from the observer service
      operationId: queryMetrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricsQueryRequest'
      responses:
        '200':
          description: Metrics queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Traces query endpoints
  /api/v1alpha1/traces/query:
    post:
      tags:
        - Traces
      summary: Query traces
      description: Query traces from the observer service
      operationId: queryTraces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TracesQueryRequest'
      responses:
        '200':
          description: Traces queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TracesQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1alpha1/traces/{traceId}/spans/query:
    post:
      tags:
        - Traces
      summary: Query spans for a trace
      description: Query spans for a trace from the observer service
      operationId: querySpansForTrace
      parameters:
        - name: traceId
          in: path
          required: true
          description: The ID of the trace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TracesQueryRequest'
      responses:
        '200':
          description: Spans queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceSpansQueryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1alpha1/traces/{traceId}/spans/{spanId}:
    get:
      tags:
        - Traces
      summary: Get details of a span for a trace
      description: Get details of a span for a trace from the observer service
      operationId: getSpanDetailsForTrace
      parameters:
        - name: traceId
          in: path
          required: true
          description: The ID of the trace
          schema:
            type: string
        - name: spanId
          in: path
          required: true
          description: The ID of the span
          schema:
            type: string
      responses:
        '200':
          description: Span details queried successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceSpanDetailsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    # Request schemas for logs
    ComponentSearchScope:
      type: object
      properties:
        namespace:
          type: string
        project:
          type: string
        component:
          type: string
        environment:
          type: string
      required: [namespace]

    WorkflowSearchScope:
      type: object
      properties:
        namespace:
          type: string
        workflowRunName:
          type: string
      required: [namespace]

    LogsQueryRequest:
      type: object
      properties:
        startTime:
          type: string
          description: The start time of the query
          format: date-time
        endTime:
          type: string
          description: The end time of the query
          format: date-time
        limit:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
          description: The maximum number of items to return
        sortOrder:
          type: string
          description: The sort order of the query
          enum:
            - asc
            - desc
          default: desc
        searchScope:
          oneOf:
            - $ref: '#/components/schemas/ComponentSearchScope'
            - $ref: '#/components/schemas/WorkflowSearchScope'
        logLevels:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: ['DEBUG', 'INFO', 'WARN', 'ERROR']
        searchPhrase:
          type: string
      required: [startTime, endTime, searchScope]

    # Response schemas for logs
    ComponentLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          description: The timestamp of the log entry
          format: date-time
        log:
          type: string
          description: The log message
        level:
          type: string
          description: The log level
        metadata:
          type: object
          description: The metadata of the log entry
          properties:
            componentName:
              type: string
              description: The OpenChoreo component name that generated the log
            projectName:
              type: string
              description: The OpenChoreo project name that generated the log
            environmentName:
              type: string
              description: The OpenChoreo environment name that generated the log
            namespaceName:
              type: string
              description: The OpenChoreo namespace name that generated the log
            componentUid:
              type: string
              description: The OpenChoreo component UID that generated the log
              format: uuid
            projectUid:
              type: string
              description: The OpenChoreo project UID that generated the log
              format: uuid
            environmentUid:
              type: string
              description: The OpenChoreo environment UID that generated the log
              format: uuid
            containerName:
              type: string
              description: The container name that generated the log
            podName:
              type: string
              description: The Kubernetes pod name that generated the log
            podNamespace:
              type: string
              description: The namespace of the Kubernetes pod that generated the log

    WorkflowLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          description: The timestamp of the log entry
          format: date-time
        log:
          type: string
          description: The log message
        metadata:
          type: object
          description: The metadata of the log entry

    LogsQueryResponse:
      type: object
      properties:
        logs:
          oneOf:
            - type: array
              items:
                $ref: '#/components/schemas/ComponentLogEntry'
            - type: array
              items:
                $ref: '#/components/schemas/WorkflowLogEntry'
          description: The logs queried successfully
        total:
          type: integer
          description: The total number of logs queried
        tookMs:
          type: integer
          description: The time taken to query the logs in milliseconds

    # Request schemas for metrics
    MetricsQueryRequest:
      type: object
      properties:
        metric:
          type: string
          description: The type of query to execute
          enum:
            - resource
            - http
        startTime:
          type: string
          description: The start time of the query
          format: date-time
        endTime:
          type: string
          description: The end time of the query
          format: date-time
        step:
          type: string
          description: The step of the query to determine the number of points to return. E.g. 1m, 5m, 15m, 30m, 1h
        searchScope:
          $ref: '#/components/schemas/ComponentSearchScope'
      required: [metric, startTime, endTime, searchScope]

    # Response schemas for metrics
    MetricsTimeSeriesItem:
      type: object
      properties:
        timestamp:
          type: string
          description: The timestamp of the time series item
          format: date-time
        value:
          type: number
          format: double
          description: The value of the time series item

    ResourceMetricsTimeSeries:
      type: object
      properties:
        cpuUsage:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        cpuRequests:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        cpuLimits:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        memoryUsage:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        memoryRequests:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        memoryLimits:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'

    HttpMetricsTimeSeries:
      type: object
      properties:
        requestCount:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        successfulRequestCount:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        unsuccessfulRequestCount:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        meanLatency:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        latencyP50:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        latencyP90:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'
        latencyP99:
          type: array
          items:
            $ref: '#/components/schemas/MetricsTimeSeriesItem'

    MetricsQueryResponse:
      oneOf:
        - $ref: '#/components/schemas/ResourceMetricsTimeSeries'
        - $ref: '#/components/schemas/HttpMetricsTimeSeries'

    # Request schemas for traces
    TracesQueryRequest:
      type: object
      properties:
        startTime:
          type: string
          description: The start time of the query
          format: date-time
        endTime:
          type: string
          description: The end time of the query
          format: date-time
        limit:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
          description: The maximum number of items to return
        sort:
          type: string
          description: The sort order of the query
          enum:
            - asc
            - desc
          default: desc
        searchScope:
          $ref: '#/components/schemas/ComponentSearchScope'
      required: [startTime, endTime, searchScope]

    # Response schemas for traces
    TracesQueryResponse:
      type: object
      properties:
        traces:
          type: array
          description: The list of traces
          items:
            type: object
            properties:
              traceId:
                type: string
                description: The trace ID
              traceName:
                type: string
                description: The name of the trace
              spanCount:
                type: integer
                description: The number of spans in the trace
              rootSpanId:
                type: string
              rootSpanName:
                type: string
              rootSpanKind:
                type: string
              startTime:
                type: string
                description: The start time of the trace
                format: date-time
              endTime:
                type: string
                description: The end time of the trace
                format: date-time
              durationNs:
                type: number
                description: The duration of the trace in nanoseconds
        total:
          type: integer
          description: The total number of traces
        tookMs:
          type: integer
          description: The time taken to query the traces in milliseconds

    TraceSpansQueryResponse:
      type: object
      properties:
        spans:
          type: array
          description: The list of spans
          items:
            type: object
            properties:
              spanId:
                type: string
                description: The span ID
              spanName:
                type: string
                description: The name of the span
              spanKind:
                type: string
                description: The name of the span
              startTime:
                type: string
                description: The start time of the span
                format: date-time
              endTime:
                type: string
                description: The end time of the span
                format: date-time
              durationNs:
                type: number
                description: The duration of the span in nanoseconds
              parentSpanId:
                type: string
                description: The parent span ID
        total:
          type: integer
          description: The total number of spans
        tookMs:
          type: integer
          description: The time taken to query the spans in milliseconds

    TraceSpanDetailsResponse:
      type: object
      properties:
        spanId:
          type: string
          description: The span ID
        spanName:
          type: string
          description: The name of the span
        startTime:
          type: string
          description: The start time of the span
          format: date-time
        endTime:
          type: string
          description: The end time of the span
          format: date-time
        durationNs:
          type: number
          description: The duration of the span in nanoseconds
        parentSpanId:
          type: string
          description: The parent span ID
        attributes:
          type: array
          items:
            type: object
            description: The attributes of the span
            properties:
              key:
                type: string
                description: The key of the attribute
              value:
                type: string
                description: The value of the attribute

    ErrorResponse:
      type: object
      required:
        - error
        - code
        - message
      properties:
        error:
          type: string
          description: Error type
          enum:
            - missingParameter
            - invalidRequest
            - internalError
          example: 'invalidRequest'
        code:
          type: string
          description: Error code
          example: 'OBS-L-12'
        message:
          type: string
          description: Human-readable error message
          example: 'Invalid request format'

    ComponentWorkflowRunLogEntry:
      type: object
      description: A single log entry from a component workflow run
      required:
        - log
      properties:
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the log entry was generated (RFC3339 format)
          example: '2025-01-06T10:00:00.123Z'
        log:
          type: string
          description: The log message content
          example: 'Building application...'

    ComponentWorkflowRunEventEntry:
      type: object
      description: A single event entry from a component workflow run
      required:
        - timestamp
        - type
        - reason
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the event entry was generated (RFC3339 format)
          example: '2025-01-06T10:00:00.123Z'
        type:
          type: string
          description: Event type
          example: 'build-started'
        reason:
          type: string
          description: Reason for the event
          example: 'Build started'
        message:
          type: string
          description: Event message
          example: 'Build started...'
